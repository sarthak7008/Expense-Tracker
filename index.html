<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VaultTrack | Smart Savings Manager</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="bg"></div>

<div class="container">

    <!-- HEADER -->
    <header>
        <h1>🧊 VaultTrack</h1>
        <p>Smart Savings & Budget Control System</p>
    </header>

    <!-- DASHBOARD CARDS -->
    <section class="grid">

        <div class="card glow">
            <h3>Vault Balance</h3>
            <h1 id="balance">₹0</h1>
        </div>

        <div class="card">
            <h3>Total Saved</h3>
            <h1 id="saved">₹0</h1>
        </div>

        <div class="card danger">
            <h3>Total Spent</h3>
            <h1 id="spent">₹0</h1>
        </div>

    </section>

    <!-- GOAL SECTION -->
    <section class="card section">

        <h2>🎯 Savings Goal</h2>

        <div class="goal-box">
            <input type="text" id="goalName" placeholder="Goal name (e.g. Laptop)">
            <input type="number" id="goalAmount" placeholder="Target amount">
            <button onclick="setGoal()">Set Goal</button>
        </div>

        <div class="goal-status">
            <h3 id="goalText">No goal set</h3>

            <div class="progress-circle">
                <div class="inner">
                    <span id="progressText">0%</span>
                </div>
            </div>
        </div>

    </section>

    <!-- TRANSACTION -->
    <section class="card section">

        <h2>💰 Add Transaction</h2>

        <div class="form">
            <input type="text" id="desc" placeholder="Description">

            <input type="number" id="amount" placeholder="Amount">

            <select id="type">
                <option value="save">Deposit (Save)</option>
                <option value="spend">Withdraw (Spend)</option>
            </select>

            <button onclick="addTransaction()">Add</button>
        </div>

    </section>

    <!-- HISTORY -->
    <section class="card section">

        <h2>📜 Transaction History</h2>

        <div id="list"></div>

    </section>

</div>

<script src="script.js"></script>
</body>
</html>
